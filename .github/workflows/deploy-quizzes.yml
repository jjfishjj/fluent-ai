name: Deploy quizzes to GitHub Pages

# Publishes the two standalone quizzes (and a landing hub) to GitHub Pages.
# Single source of truth: /quizzes. Site layout once deployed:
#   /                      -> landing hub (quizzes/index.html)
#   /memory-quiz/          -> 記憶語言天賦測驗
#   /memory-genius-quiz/   -> 記憶天才測定
#
# ONE-TIME SETUP: this requires GitHub Pages to be enabled with the
# "GitHub Actions" source (Repo → Settings → Pages → Source: GitHub Actions).
# The Actions token cannot enable Pages automatically on this repo, so that
# toggle must be flipped once by a repo admin; afterwards every push deploys.
# (The quizzes also deploy automatically via Vercel at /quizzes/* with no
# settings change — see vercel.json.)

on:
  push:
    branches:
      - main
      - claude/brave-clarke-7PopL
    paths:
      - 'quizzes/**'
      - '.github/workflows/deploy-quizzes.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assemble site
        run: |
          mkdir -p _site/memory-quiz _site/memory-genius-quiz
          cp quizzes/index.html _site/index.html
          cp quizzes/memory-quiz/index.html _site/memory-quiz/index.html
          cp quizzes/memory-genius-quiz/index.html _site/memory-genius-quiz/index.html

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
