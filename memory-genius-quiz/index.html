  ["看一部外語影片，你先抓住：",["角色情緒、語氣、畫面","s"],["劇情結構、台詞邏輯","ab"]],
  ["你做筆記偏向：",["塗鴉、圖示、顏色標記","s"],["大綱、表格、條列","ab"]],
  ["解釋一件事給別人，你會：",["舉具體例子、演出來","s"],["講清楚原則和架構","ab"]],
  ["你覺得自己更像：",["感官型——靠體驗記憶","s"],["思考型——靠理解記憶","ab"]],
];
const Y_Q = [
  ["你學得最好，當：",["長時間深入鑽研一個主題","d"],["快節奏、即時互動回饋","im"]],
  ["面對新材料，你傾向：",["慢慢消化、徹底搞懂","d"],["先用起來、邊做邊修","im"]],
  ["理想的學習時段是：",["不被打擾的長時段","d"],["零碎時間、短衝刺","im"]],
  ["你比較享受：",["沉浸到忘記時間","d"],["快速見到成果","im"]],
  ["遇到難點你會：",["停下來徹底弄懂再前進","d"],["先跳過、之後再回頭","im"]],
  ["你偏好的練習：",["深度精練少量內容","d"],["大量快速反覆接觸","im"]],
  ["學語言，你想先：",["打好系統基礎","d"],["馬上能開口溝通","im"]],
  ["你的專注模式：",["慢熱但持久","d"],["爆發力強、節奏快","im"]],
  ["完成一個任務，你重視：",["做到精緻完整","d"],["做得快、能交付","im"]],
  ["你覺得自己更像：",["深潛者——沉浸式學習","d"],["衝刺者——即時反應","im"]],
];
const P_Q = [
  ["最讓你「記住」的學習活動：",[["親手操作、角色扮演","k"],["跟讀、聽音模仿","a"],["閱讀、做筆記","r"],["看圖、視覺化","v"]]],
  ["你最自然的輸出方式：",[["動手做、實境演練","k"],["開口說、討論","a"],["寫下來、整理成文","r"],["畫出來、圖解","v"]]],
  ["哪種記憶鉤子對你最強？",[["身體動作與情境","k"],["聲音、語調、節奏","a"],["文字、定義、結構","r"],["影像、空間、顏色","v"]]],
  ["安靜獨處時，你更想：",[["動手做點什麼","k"],["聽音樂或 Podcast","a"],["讀書或寫東西","r"],["看影片或圖片","v"]]],
  ["你學習時最像哪種人？",[["把知識連成一張網","cn"],["站上舞台表達、感染他人","pf"],["拆解到底、追根究柢","an"],["把一切編成故事","na"]]],
  ["你最享受的時刻：",[["發現兩個領域意外的關聯","cn"],["即興演出、現場互動","pf"],["找出規律、解開謎題","an"],["講一個動人的故事","na"]]],
  ["朋友會說你擅長：",[["觸類旁通、整合資訊","cn"],["帶動氣氛、表達力強","pf"],["邏輯清晰、分析透徹","an"],["敘事生動、有畫面感","na"]]],
  ["你的學習超能力是：",[["把零散知識織成網","cn"],["在壓力下即興發揮","pf"],["把複雜變簡單、看穿本質","an"],["用故事讓抽象變難忘","na"]]],
];

const ALL = [
  ...X_Q.map(([q,a,b])=>({g:"X", q, opts:[a,b]})),
  ...Y_Q.map(([q,a,b])=>({g:"Y", q, opts:[a,b]})),
  ...P_Q.map(([q,opts])=>({g:"P", q, opts})),
];
const LETTERS=["A","B","C","D"];

let idx=0, locked=false;
const answers=new Array(ALL.length).fill(-1);
const app=document.getElementById("app");
function render(h){ app.innerHTML=h; window.scrollTo({top:0,behavior:"smooth"}); }

function intro(){
  render(`
  <div class="card center">
    <div class="hero-emoji">✨</div>
    <div class="badge">Memory Genius Type</div>
    <h1>記憶天才測定</h1>
    <p class="sub">兩軸 28 題，從 8 種記憶天才類型中找出你的<b>主類型 + 副類型</b>，
      對應 VARK 學習風格與最佳腦波時段，附 12 週學習計畫。</p>
    <div class="axisnote">
      <div class="row">🧭 <b>X 軸</b>：記憶觸發方式（感官 ↔ 抽象）</div>
      <div class="row">🌊 <b>Y 軸</b>：學習節奏（深度沉浸 ↔ 即時反應）</div>
      <div class="row">🎯 <b>象限定位</b>：K / A / R / V × 連結 / 展演 / 分析 / 敘事</div>
    </div>
    <div class="features">
      <div class="feat"><span class="ic">🧠</span><span>8 類型 × VARK × 腦波 × 最佳時段</span></div>
      <div class="feat"><span class="ic">🪪</span><span>天賦身份卡 + 記憶特徵 + 金句</span></div>
      <div class="feat"><span class="ic">📅</span><span>個人化 12 週語言學習計畫</span></div>
    </div>
    <button class="btn" onclick="start()">開始測定（約 5–8 分鐘）</button>
    <p class="meta">沒有對錯答案 · 選最像你自然反應的選項</p>
  </div>`);
}
function start(){ idx=0; answers.fill(-1); question(); }

function question(){
  const item=ALL[idx];
  const pct=Math.round((idx/ALL.length)*100);
  const gm={X:["記憶觸發","#ede9fe","#6d28d9"],Y:["學習節奏","#dbeafe","#1d4ed8"],P:["象限定位","#dcfce7","#15803d"]};
  const g=gm[item.g];
  render(`
  <div class="card">
    <div class="pbar-row">
      <button class="opt" style="border:0;background:transparent;padding:6px 8px;width:auto;${idx===0?'opacity:.3':''}" onclick="back()">←</button>
      <div class="pbar"><div class="pfill" style="width:${pct}%"></div></div>
      <span class="pcount">${idx+1}/${ALL.length}</span>
    </div>
    <span class="qgroup" style="background:${g[1]};color:${g[2]}">${g[0]}</span>
    <div class="qtext fade" id="q">${item.q}</div>
    <div class="opts fade" id="o">
      ${item.opts.map((o,i)=>`<button class="opt" onclick="choose(${i})"><span class="dot">${LETTERS[i]}</span><span>${o[0]}</span></button>`).join("")}
    </div>
  </div>`);
  requestAnimationFrame(()=>{document.getElementById("q").classList.add("show");document.getElementById("o").classList.add("show");});
}
function choose(i){
  if(locked) return; answers[idx]=i; locked=true;
  const o=document.getElementById("o"),q=document.getElementById("q");
  o.classList.remove("show");q.classList.remove("show");
  setTimeout(()=>{locked=false; if(idx>=ALL.length-1) result(); else {idx++;question();}},260);
}
function back(){ if(idx>0){idx--;question();} else intro(); }

/* ---------------- Scoring (5 steps) ---------------- */
function compute(){
  const d={s:0,ab:0,d:0,im:0,k:0,a:0,r:0,v:0,cn:0,pf:0,an:0,na:0};
  ALL.forEach((item,qi)=>{
    const ai=answers[qi]; if(ai<0) return;
    const key=item.opts[ai][1]; d[key]=(d[key]||0)+2;
  });
  // step 1: axis scores
  const xScore=d.ab-d.s;     // >0 抽象, <0 感官
  const yScore=d.d-d.im;     // >0 深度, <0 即時
  // step 2: quadrant
  let quad;
  if(xScore<=0 && yScore>=0) quad="innovation";
  else if(xScore>0 && yScore>=0) quad="perception";
  else if(xScore<=0 && yScore<0) quad="integration";
  else quad="action";
  // step 3-4: primary + secondary within quadrant
  let primary,secondary;
  if(quad==="innovation"){ if(d.k>=d.a){primary="explorer";secondary="melodist";} else {primary="melodist";secondary="explorer";} }
  else if(quad==="perception"){ if((d.r+d.an)>=(d.na+d.a)){primary="architect";secondary="narrator";} else {primary="narrator";secondary="architect";} }
  else if(quad==="integration"){ if(d.cn>=d.pf){primary="connector";secondary="performer";} else {primary="performer";secondary="connector";} }
  else { if(d.an>=d.v){primary="analyst";secondary="visionary";} else {primary="visionary";secondary="analyst";} }
  return {d,xScore,yScore,quad,primary,secondary};
}

/* ---------------- Result ---------------- */
let weekTab=1, R=null;
function result(){
  R=compute(); weekTab=1;
  try{ localStorage.setItem("memo_genius_result",JSON.stringify({p:R.primary,s:R.secondary,t:Date.now()})); }catch(e){}
  draw();
}
function setWeek(w){ weekTab=w; draw(); }

function draw(){
  const P=TYPES[R.primary], S=TYPES[R.secondary], Q=QUADRANTS[R.quad];
  // dot position: x -20..20, y -20..20
  const cx=Math.max(-20,Math.min(20,R.xScore)), cy=Math.max(-20,Math.min(20,R.yScore));
  const left=((cx+20)/40)*100, top=((20-cy)/40)*100;
  const weeks=[[1,"第 1–4 週",P.w1],[2,"第 5–8 週",P.w5],[3,"第 9–12 週",P.w9]];

  render(`
  <div class="card">
    <div class="calib">
      <span class="ic">🔬</span>
      <span class="t">在 <b>fluent-ai App</b> 中，此結果會用你的腦力訓練數據（注意力反應時間、N-back 分數、錯誤率）自動校準軸分，準確度更高。此頁為獨立版本，採純問卷評分。</span>
    </div>

    <div class="identity" style="background:${P.grad}">
      <div class="label">你的記憶天才類型</div>
      <div class="tname">${P.emoji} ${P.name}</div>
      <div class="ten">${P.en} · ${Q.zh}（${Q.desc}）</div>
      <div class="tline">${P.tagline}</div>
      <div class="tags">
        <span class="tag">📚 ${P.vark}</span>
        <span class="tag">🧠 ${P.brainwave}</span>
        <span class="tag">⏰ ${P.bestTime}</span>
      </div>
      <div class="quote">「${P.quote}」</div>
    </div>

    <div class="sec-title">你的記憶座標</div>
    <div class="quad" style="aspect-ratio:1/1">
      <div class="axisx"></div><div class="axisy"></div>
      <span class="ax" style="top:4px;left:50%;transform:translateX(-50%)">深度沉浸</span>
      <span class="ax" style="bottom:4px;left:50%;transform:translateX(-50%)">即時反應</span>
      <span class="ax" style="left:4px;top:50%;transform:translateY(-50%)">感官</span>
      <span class="ax" style="right:4px;top:50%;transform:translateY(-50%)">抽象</span>
      <span class="ql" style="top:8px;left:8px">創新</span>
      <span class="ql" style="top:8px;right:8px;text-align:right">感知</span>
      <span class="ql" style="bottom:8px;left:8px">整合</span>
      <span class="ql" style="bottom:8px;right:8px;text-align:right">行動</span>
      <div class="dot2" style="left:${left}%;top:${top}%;background:${P.color}"></div>
    </div>
    <div class="infobox" style="margin-top:10px">
      X 軸（感官 ↔ 抽象）：<b>${R.xScore>0?"+"+R.xScore:R.xScore}</b>　·
      Y 軸（即時 ↔ 深度）：<b>${R.yScore>0?"+"+R.yScore:R.yScore}</b>
    </div>

    <div class="sec-title">你的記憶特徵</div>
    <div class="block">
      ${P.traits.map((t,i)=>`<div class="li"><span class="nk" style="background:${P.color}">${i+1}</span><span>${t}</span></div>`).join("")}
    </div>

    <div class="sec-title">最有效的學法</div>
    <div class="block">
      ${P.best.map(m=>`<div class="li"><span class="ck">✓</span><span>${m}</span></div>`).join("")}
    </div>

    <div class="sec-title">應避免的學法</div>
    <div class="warn">
      ${P.avoid.map(m=>`<div class="wx"><span>✗</span><span>${m}</span></div>`).join("")}
    </div>

    <div class="sec-title">12 週學習計畫</div>
    <div class="weekbtns">
      ${weeks.map(([w,l])=>`<button class="weekbtn ${weekTab===w?'on':''}" style="${weekTab===w?'background:'+P.color:''}" onclick="setWeek(${w})">${l}</button>`).join("")}
    </div>
    <div class="weekbody">${weeks.find(w=>w[0]===weekTab)[2]}</div>

    <div class="sec-title">副類型 · ${S.emoji} ${S.name}（${S.en}）</div>
    <div class="infobox">
      <b>${S.name}</b>：${S.tagline}<br><br>
      可在主路線中穿插：${S.best.slice(0,2).join("、")}。
    </div>

    <div style="margin-top:28px;display:flex;gap:10px;flex-wrap:wrap;justify-content:center">
      <button class="btn ghost sm" onclick="intro()">重新測驗</button>
      <button class="btn sm" onclick="shareResult('${P.name}')">分享我的類型</button>
    </div>
    <div class="footer-note">
      記憶天才測定 · Memory Genius Type　|　8 類型 × VARK × 腦波<br>
      結果僅供學習規劃參考。
    </div>
  </div>`);
}

function shareResult(name){
  const text=`我的記憶天才類型是「${name}」！來測測你的 👉`;
  if(navigator.share){ navigator.share({title:"記憶天才測定",text,url:location.href}).catch(()=>{}); }
  else { navigator.clipboard?.writeText(`${text} ${location.href}`).then(()=>alert("已複製分享文字！"),()=>{}); }
}

window.start=start;window.choose=choose;window.back=back;window.intro=intro;
window.setWeek=setWeek;window.shareResult=shareResult;
intro();
</script>
</body>
</html>
