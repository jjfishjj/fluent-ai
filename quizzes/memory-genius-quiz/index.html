const VARK_ROWS = [['視覺 V','v','#6366f1'],['聽覺 A','a','#f59e0b'],['讀寫 R','r','#0ea5e9'],['動覺 K','k','#10b981']];
function varkBars(w){
  const max = Math.max(w.v,w.a,w.r,w.k) || 1;
  return VARK_ROWS.map(([lab,k,c])=>{
    const pct = Math.round(w[k]/max*100);
    return `<div class="vrow"><span class="vk">${lab}</span><span class="vtrack"><span class="vfill" style="width:${pct}%;background:${c}"></span></span><span class="vv">${pct}</span></div>`;
  }).join('');
}

function stratCard(lab, o, color){
  return `<div class="strat"><div class="lab" style="color:${color}">${lab}</div>`
    + `<div class="st">${o.t}</div><div class="sb">${o.b}</div>`
    + (o.schedule ? `<div class="srs"><span class="lbl">間隔複習</span>`
        + o.schedule.map((d,i)=>`<span class="d">第 ${d} 天</span>${i<o.schedule.length-1?'<span class="ar">→</span>':''}`).join('')
        + `</div>` : '')
    + `</div>`;
}

    </div>
    <div class="features">
      <div class="feat"><span class="ic">🧠</span><span>8 類型 × VARK × 腦波 × 最佳時段</span></div>
      <div class="feat"><span class="ic">🔬</span><span>Brain Lab 校準：反應力 + 記憶廣度小測驗微調軸分</span></div>
      <div class="feat"><span class="ic">🪪</span><span>天賦身份卡 + 記憶特徵 + 金句</span></div>

    </div>
    <button class="btn" onclick="start()">開始測定（約 5–8 分鐘）</button>
    <p class="meta">沒有對錯答案 · 選最像你自然反應的選項</p>
  </div>`);
}
function start(){ idx=0; answers.fill(-1); question(); }

function question(){
  const item=ALL[idx];
  const pct=Math.round((idx/ALL.length)*100);
  const gm={X:["記憶觸發","#ede9fe","#6d28d9"],Y:["學習節奏","#dbeafe","#1d4ed8"],P:["象限定位","#dcfce7","#15803d"]};
  const g=gm[item.g];
  render(`
  <div class="card">
    <div class="pbar-row">
      <button class="opt" style="border:0;background:transparent;padding:6px 8px;width:auto;${idx===0?'opacity:.3':''}" onclick="back()">←</button>
      <div class="pbar"><div class="pfill" style="width:${pct}%"></div></div>
      <span class="pcount">${idx+1}/${ALL.length}</span>
    </div>
    <span class="qgroup" style="background:${g[1]};color:${g[2]}">${g[0]}</span>
    <div class="qtext fade" id="q">${item.q}</div>
    <div class="opts fade" id="o">
      ${item.opts.map((o,i)=>`<button class="opt" onclick="choose(${i})"><span class="dot">${LETTERS[i]}</span><span>${o[0]}</span></button>`).join("")}
    </div>
  </div>`);
  requestAnimationFrame(()=>{document.getElementById("q").classList.add("show");document.getElementById("o").classList.add("show");});
}
function choose(i){
  if(locked) return; answers[idx]=i; locked=true;
  const o=document.getElementById("o"),q=document.getElementById("q");
  o.classList.remove("show");q.classList.remove("show");
  setTimeout(()=>{locked=false; if(idx>=ALL.length-1) afterQuiz(); else {idx++;question();}},260);
}
function back(){ if(idx>0){idx--;question();} else intro(); }

/* ---------------- Brain Lab calibration (self-contained) ---------------- */
let calib={done:false, avgRt:null, memAcc:null, source:null};
const RT_TRIALS=5;
let rtTimes=[], rtState='idle', rtStart=0, rtTimer=null, rtRound=0;
const MEM_POOL=['🍎','🚀','🎸','🌙','⚡','🎲','🔑','🌵','🎯','🧩','🍀','⏰'];
let memTargets=[], memSel=[], memPool=[];

function afterQuiz(){
  if(calib.source==='app' && calib.done){ result(); return; } // app supplied real EEG/game data
  calibIntro();
}
function calibIntro(){
  render(`
  <div class="card center">
    <div class="hero-emoji">🔬</div>
    <div class="badge">Brain Lab 校準</div>
    <h1 style="font-size:24px">用反應力校準你的結果</h1>
    <p class="sub">兩個小測驗——反應速度與記憶廣度，會微調你的<br>
      「即時 ↔ 深度」與「感官 ↔ 抽象」軸分，讓類型判定更準。</p>
    <div class="axisnote">
      <div class="row">⚡ <b>反應測驗</b>：5 次點擊，測處理速度 → 即時／深度傾向</div>
      <div class="row">🧠 <b>記憶測驗</b>：記住 6 個圖案再回選 → 抽象／感官記憶</div>
    </div>
    <button class="btn" onclick="startReaction()">開始校準（約 30 秒）</button>
    <button class="btn ghost sm" style="margin-top:10px;width:100%" onclick="skipCalib()">略過，直接看結果</button>
  </div>`);
}
function skipCalib(){ calib.done=false; calib.source=null; result(); }

function startReaction(){ rtTimes=[]; rtRound=0; reactionRound(); }
function reactionRound(){
  rtState='wait';
  render(`
  <div class="card">
    <div class="qgroup" style="background:#ede9fe;color:#6d28d9">反應測驗 ${rtRound+1}/${RT_TRIALS}</div>
    <div class="rt-box rt-wait" onclick="reactionTap()">準備……<br>變綠色就立刻點擊</div>
    <div class="rt-meta">看到綠色再點；太早點會重來</div>
  </div>`);
  const delay=900+Math.random()*1900;
  rtTimer=setTimeout(()=>{
    rtState='go'; rtStart=performance.now();
    render(`
    <div class="card">
      <div class="qgroup" style="background:#ede9fe;color:#6d28d9">反應測驗 ${rtRound+1}/${RT_TRIALS}</div>
      <div class="rt-box rt-go" onclick="reactionTap()">點擊！</div>
      <div class="rt-meta">越快越好</div>
    </div>`);
  }, delay);
}
function reactionTap(){
  if(rtState==='wait'){
    clearTimeout(rtTimer); rtState='idle';
    render(`
    <div class="card center">
      <div class="rt-box rt-early">太早了！<br>這一輪重來</div>
      <button class="btn sm" style="margin-top:16px" onclick="reactionRound()">再試一次</button>
    </div>`);
    return;
  }
  if(rtState==='go'){
    const ms=performance.now()-rtStart; rtTimes.push(ms); rtState='idle'; rtRound++;
    if(rtRound>=RT_TRIALS){
      calib.avgRt=Math.round(rtTimes.reduce((a,b)=>a+b,0)/rtTimes.length);
      startMemory();
    } else reactionRound();
  }
}

function shuffle(arr){ const a=[...arr];
  for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function startMemory(){ memSel=[]; memTargets=shuffle(MEM_POOL).slice(0,6); memShow(); }
function memShow(){
  render(`
  <div class="card">
    <div class="qgroup" style="background:#dcfce7;color:#15803d">記憶測驗 · 記住這 6 個</div>
    <div class="qtext" style="text-align:center">記住下面 6 個圖案（3 秒）</div>
    <div class="mem-grid">
      ${memTargets.map(s=>`<div class="mem-cell tgt">${s}</div>`).join("")}
      <div class="mem-cell blank"></div><div class="mem-cell blank"></div>
    </div>
    <div class="rt-meta" id="cd" style="font-size:22px;font-weight:800;color:#7c3aed">3</div>
  </div>`);
  let n=3; const t=setInterval(()=>{ n--; const cd=document.getElementById('cd');
    if(cd) cd.textContent=n>0?n:'…'; if(n<=0){ clearInterval(t); memRecall(); } },1000);
}
function memRecall(){ memPool=shuffle(MEM_POOL); drawRecall(); }
function drawRecall(){
  render(`
  <div class="card">
    <div class="qgroup" style="background:#dcfce7;color:#15803d">記憶測驗 · 回選</div>
    <div class="qtext" style="text-align:center">剛剛出現了哪 6 個？（已選 ${memSel.length}/6）</div>
    <div class="mem-grid">
      ${memPool.map(s=>`<div class="mem-cell ${memSel.includes(s)?'sel':''}" onclick="memToggle('${s}')">${s}</div>`).join("")}
    </div>
    <button class="btn sm" style="margin-top:18px;width:100%;${memSel.length===6?'':'opacity:.45;pointer-events:none'}" onclick="memSubmit()">完成校準，看結果</button>
  </div>`);
}
function memToggle(s){
  if(memSel.includes(s)) memSel=memSel.filter(x=>x!==s);
  else if(memSel.length<6) memSel.push(s);
  drawRecall();
}
function memSubmit(){
  const hits=memSel.filter(s=>memTargets.includes(s)).length;
  calib.memAcc=hits/6; calib.done=true; calib.source='self';
  result();
}

/* ---------------- Scoring (5 steps) ---------------- */
function compute(){
  const d={s:0,ab:0,d:0,im:0,k:0,a:0,r:0,v:0,cn:0,pf:0,an:0,na:0};
  ALL.forEach((item,qi)=>{
    const ai=answers[qi]; if(ai<0) return;
    const key=item.opts[ai][1]; d[key]=(d[key]||0)+2;
  });
  // step 5: Brain Lab calibration — reaction time & memory span nudge the axes
  if(calib.done){
    if(calib.avgRt!=null){
      if(calib.avgRt<650) d.im+=3;        // very fast → 即時反應
      else if(calib.avgRt<850) d.im+=1;
      else if(calib.avgRt>1100) d.d+=2;   // deliberate → 深度沉浸
    }
    if(calib.memAcc!=null){
      if(calib.memAcc>=0.8) d.ab+=2;       // strong structural memory → 抽象
      else if(calib.memAcc<0.5) d.s+=1;    // → 感官
    }
  }
  // step 1: axis scores
  const xScore=d.ab-d.s;     // >0 抽象, <0 感官
  const yScore=d.d-d.im;     // >0 深度, <0 即時
  // step 2: quadrant
  let quad;
  if(xScore<=0 && yScore>=0) quad="innovation";
  else if(xScore>0 && yScore>=0) quad="perception";
  else if(xScore<=0 && yScore<0) quad="integration";
  else quad="action";
  // step 3-4: primary + secondary within quadrant
  let primary,secondary;
  if(quad==="innovation"){ if(d.k>=d.a){primary="explorer";secondary="melodist";} else {primary="melodist";secondary="explorer";} }
  else if(quad==="perception"){ if((d.r+d.an)>=(d.na+d.a)){primary="architect";secondary="narrator";} else {primary="narrator";secondary="architect";} }
  else if(quad==="integration"){ if(d.cn>=d.pf){primary="connector";secondary="performer";} else {primary="performer";secondary="connector";} }
  else { if(d.an>=d.v){primary="analyst";secondary="visionary";} else {primary="visionary";secondary="analyst";} }
  return {d,xScore,yScore,quad,primary,secondary};
}

/* ---------------- Result ---------------- */
let weekTab=1, R=null;
function result(){
  R=compute(); weekTab=1;
  try{ localStorage.setItem("memo_genius_result",JSON.stringify({p:R.primary,s:R.secondary,vark:VARK_MAP[R.primary].dom,t:Date.now()})); }catch(e){}

}

  render(`
