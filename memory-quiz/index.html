<style>

  .features{margin:22px 0;text-align:left;display:flex;flex-direction:column;gap:12px}

let locked=false;
function choose(i){
  if(locked) return;
  answers[idx]=i;
  locked=true;
  const o=document.getElementById("o"), q=document.getElementById("q");
  o.classList.remove("show"); q.classList.remove("show");
  setTimeout(()=>{ locked=false;
    if(idx>=ALL.length-1){ result(); } else { idx++; question(); }
  },260);
}
function back(){ if(idx>0){ idx--; question(); } else { intro(); } }

/* ---------------- Scoring ---------------- */
function compute(){
  const score={img:0,snd:0,txt:0,act:0,soc:0,sys:0,cre:0,biz:0};
  let rhythm=null, output=null;
  const obst={};
  ALL.forEach((item,qi)=>{
    const a=answers[qi]; if(a<0) return;
    const val=item.opts[a][1];
    if(item.kind==="type"){ score[val]++; }
    else if(item.kind==="rhythm"){ rhythm=val; }
    else if(item.kind==="output"){ output=val; }
    else if(item.kind==="obstacle"){ obst[val]=(obst[val]||0)+1; }
  });
  const ranked=Object.entries(score).sort((a,b)=>b[1]-a[1]);
  const primary=ranked[0][0], secondary=ranked[1][0];
  const total=Object.values(score).reduce((s,v)=>s+v,0)||1;

  // blended indicators
  const inp={v:0,a:0,t:0,k:0};
  const mem={image:0,sound:0,logic:0,situation:0,emotion:0,social:0};
  Object.keys(score).forEach(t=>{
    const w=score[t]/total;
    const p=PROFILE[t];
    for(const k in inp) inp[k]+=w*p.input[k];
    for(const k in mem) mem[k]+=w*p.mem[k];
  });
  const norm=o=>{const m=Math.max(...Object.values(o))||1;
    const r={}; for(const k in o) r[k]=Math.round((o[k]/m)*100); return r;};

  // obstacle: most weighted (tie -> first)
  let obstacle=null,best=-1;
  for(const k in obst){ if(obst[k]>best){best=obst[k];obstacle=k;} }

  // axis position (blended, -1..1 scaled to -10..10)
  let ax=0, ay=0;
  Object.keys(score).forEach(t=>{ const w=score[t]/total; ax+=w*AXIS[t].x; ay+=w*AXIS[t].y; });

  return {score,primary,secondary,inp:norm(inp),mem:norm(mem),rhythm,output,obstacle,ax,ay};
}

}

    </div>
  </div>`);
}

function barRow(label,val,color){
  return `<div class="bar-row">
    <span class="bl">${label}</span>
    <span class="bar-track"><span class="bar-fill" style="width:${val}%;background:${color}"></span></span>
    <span class="bv">${val}</span></div>`;
}

function shareResult(name){
  const text=`我的記憶語言天賦是「${name}」！來測測你的 👉`;
  const url=location.href;
  if(navigator.share){ navigator.share({title:"記憶語言天賦測驗",text,url}).catch(()=>{}); }
  else { navigator.clipboard?.writeText(`${text} ${url}`).then(()=>alert("已複製分享文字！"),()=>{}); }
}

window.start=start; window.choose=choose; window.back=back;
window.intro=intro; window.shareResult=shareResult;
intro();
</script>
